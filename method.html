<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>势必智库 Insights — HITIBIG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root { --cyan-accent: #00e5cc; --bg-dark: #03050a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Satoshi', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-dark); background-image: radial-gradient(1px 1px at 25px 5px, #ffffff, transparent), radial-gradient(1px 1px at 50px 25px, rgba(255,255,255,0.8), transparent), radial-gradient(1.5px 1.5px at 125px 20px, #ffffff, transparent), radial-gradient(2px 2px at 80px 80px, rgba(255,255,255,0.5), transparent), radial-gradient(1px 1px at 10px 115px, rgba(255,255,255,0.7), transparent), radial-gradient(1.5px 1.5px at 110px 140px, #ffffff, transparent), radial-gradient(1px 1px at 145px 105px, rgba(255,255,255,0.4), transparent); background-size: 150px 150px; z-index: -2; animation: twinkle 4s ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 0.9; } }
        .nebula { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; background: radial-gradient(ellipse at 50% 40%, rgba(0, 229, 204, 0.08) 0%, transparent 60%); z-index: -1; filter: blur(90px); pointer-events: none; }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: 0.4s ease; }
        .glass-card:hover { border-color: rgba(0, 229, 204, 0.3); background: rgba(255, 255, 255, 0.03); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,229,204,0.1); }
        .gradient-title { font-family: 'Clash Display', sans-serif; background: linear-gradient(180deg, #ffffff 0%, #00e5cc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 激活状态的分类按钮样式 */
        .filter-btn.active { border-color: var(--cyan-accent); color: var(--cyan-accent); background-color: rgba(0, 229, 204, 0.1); box-shadow: 0 0 15px rgba(0,229,204,0.2); }
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="nebula"></div>

    <nav class="w-full absolute top-0 z-50 left-0 right-0 h-32">
        <a href="index.html" class="absolute left-4 top-6 md:left-8 md:top-8 px-5 py-2.5 rounded-full border border-white/10 bg-[#050810]/60 backdrop-blur-md text-xs text-gray-400 tracking-widest hover:text-cyan-400 hover:border-cyan-400/50 hover:bg-cyan-400/5 transition-all flex items-center">
            ← 返回首页
        </a>
        <div class="absolute left-1/2 -translate-x-1/2 top-6 md:top-8 flex flex-col items-center pointer-events-none">
            <img src="./logo.png" alt="HITIBIG 势必" class="h-14 md:h-16 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hidden flex-col items-center">
                <span class="text-[9px] tracking-[0.4em] font-bold text-white uppercase mb-0.5">HIT | BIG</span>
                <span class="text-2xl md:text-3xl font-bold tracking-[0.1em] text-white mb-0.5">势必</span>
                <span class="text-[7px] tracking-[0.3em] text-gray-500 uppercase">AI 品牌实验室</span>
            </div>
        </div>
    </nav>

    <main class="w-full flex flex-col items-center pt-36 pb-24 px-6 relative z-10 min-h-screen">
        
        <div class="text-center mb-16 animate__animated animate__fadeInDown">
            <h1 class="text-5xl md:text-6xl font-bold mb-4 tracking-tight">势必智库 <span class="gradient-title">Insights</span></h1>
            <p class="text-gray-500 text-sm md:text-base tracking-[0.2em]">解码 AI 时代的品牌心智渗透法则</p>
        </div>

        <div id="filter-container" class="flex flex-wrap justify-center gap-3 mb-16 animate__animated animate__fadeInUp">
            <button data-filter="all" class="filter-btn active px-5 py-2 rounded-full border border-white/10 text-gray-400 text-xs tracking-widest transition hover:border-cyan-400/50 hover:text-cyan-400 bg-white/5">全部 All</button>
            <button data-filter="Report" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-gray-400 text-xs tracking-widest transition hover:border-cyan-400/50 hover:text-cyan-400 bg-white/5">研究报告 Reports</button>
            <button data-filter="Methodology" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-gray-400 text-xs tracking-widest transition hover:border-cyan-400/50 hover:text-cyan-400 bg-white/5">方法论 Methodology</button>
            <button data-filter="Case" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-gray-400 text-xs tracking-widest transition hover:border-cyan-400/50 hover:text-cyan-400 bg-white/5">实战案例 Cases</button>
        </div>

        <div id="articles-wrapper" class="w-full max-w-6xl space-y-10 animate__animated animate__fadeInUp animate__delay-1s">
            <div class="text-center text-gray-500 py-10">正在从势必云端获取最新洞察...</div>
        </div>

    </main>

    <footer class="w-full py-10 text-center text-[10px] text-gray-600 tracking-widest uppercase border-t border-white/5 relative z-10 bg-[#020306]">
        © 2026 HITIBIG AI-BRANDING LAB
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const wrapper = document.getElementById('articles-wrapper');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            let allArticles = []; // 用于在内存中保存抓取到的所有文章

            // 1. 从后台抓取数据
            fetch('/articles.json')
                .then(data => {
                    if (data.items && data.items.length > 0) {
                        // 🌟 核心升级：前台全自动按日期从新到旧排序！
                        // 无论您在后台是先写的新文章还是旧文章，前台都会自动把日期最近的排在最前面。
                        allArticles = data.items.sort((a, b) => new Date(b.date) - new Date(a.date));
                        
                        renderArticles('all'); // 首次加载，渲染全部分类
                    } else {
                        wrapper.innerHTML = '<div class="text-center text-gray-500 py-10">暂无智库文章，请前往后台发布。</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    wrapper.innerHTML = '<div class="text-center text-gray-500 py-10">后台数据未准备好，请确认已在 admin 成功发布文章。</div>';
                });

            // 2. 绑定分类按钮的点击事件
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 切换按钮的高亮状态 (移除所有，单独给点击的加 active)
                    filterBtns.forEach(b => {
                        b.classList.remove('active', 'border-cyan-400', 'text-cyan-400', 'bg-cyan-400/10');
                        b.classList.add('border-white/10', 'text-gray-400', 'bg-white/5');
                    });
                    
                    btn.classList.add('active', 'border-cyan-400', 'text-cyan-400', 'bg-cyan-400/10');
                    btn.classList.remove('border-white/10', 'text-gray-400', 'bg-white/5');

                    // 获取按钮上的分类标签并重新渲染文章
                    const filterValue = btn.getAttribute('data-filter');
                    renderArticles(filterValue);
                });
            });

            // 3. 渲染文章卡片的函数
            function renderArticles(filterType) {
                wrapper.innerHTML = ''; 
                
                // 核心过滤逻辑：如果是 all 就全展示，否则进行模糊匹配
                const filteredList = filterType === 'all' 
                    ? allArticles 
                    : allArticles.filter(article => article.category.toLowerCase().includes(filterType.toLowerCase()));

                if (filteredList.length === 0) {
                    wrapper.innerHTML = '<div class="text-center text-gray-500 py-20 animate__animated animate__fadeIn">该分类下暂无洞察文章。</div>';
                    return;
                }

                let featuredHTML = '';
                let gridHTML = '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">';

                filteredList.forEach(article => {
                    const articleUrl = `article.html?id=${article.id}`;
                    
                    if (article.is_featured && filterType === 'all') {
                        // 头条大卡片（仅在“全部”分类下展示为大卡片，过滤后统统变成小卡片保证排版统一）
                        featuredHTML += `
                        <a href="${articleUrl}" class="glass-card p-2 md:p-3 overflow-hidden group block animate__animated animate__fadeIn">
                            <div class="flex flex-col md:flex-row gap-6 md:gap-10 h-full">
                                <div class="w-full md:w-5/12 min-h-[250px] md:min-h-[350px] bg-gradient-to-br from-cyan-900/30 to-[#020306] rounded-2xl flex items-center justify-center border border-white/5 relative overflow-hidden">
                                    <div class="absolute inset-0 bg-cyan-500/10 opacity-0 group-hover:opacity-100 transition duration-700"></div>
                                    <span class="border border-cyan-500/30 text-cyan-400/50 px-6 py-2 rounded-full text-[10px] tracking-[0.2em] font-bold z-10 uppercase">FEATURED</span>
                                </div>
                                <div class="w-full md:w-7/12 py-6 pr-6 md:py-10 md:pr-10 flex flex-col justify-center">
                                    <div class="flex items-center gap-4 text-[11px] font-bold tracking-widest uppercase mb-5">
                                        <span class="text-cyan-400">${article.category}</span>
                                        <span class="text-gray-500">${article.date}</span>
                                    </div>
                                    <h3 class="text-3xl md:text-4xl font-bold text-white mb-6 leading-tight group-hover:text-cyan-300 transition-colors">${article.title}</h3>
                                    <p class="text-gray-400 text-sm leading-relaxed mb-10 flex-grow line-clamp-3">${article.summary}</p>
                                    <div class="text-white font-bold text-sm flex items-center gap-2 w-max pb-1 border-b border-white/20 group-hover:text-cyan-400 group-hover:border-cyan-400 transition-all">
                                        深度阅读 Read More <span class="transform group-hover:translate-x-1 transition-transform">↗</span>
                                    </div>
                                </div>
                            </div>
                        </a>`;
                    } else {
                        // 常规瀑布流小卡片
                        // 根据分类给标签加上不同的颜色 (增加高级感细节)
                        let tagColorClass = "text-cyan-400 border-cyan-500/30 bg-cyan-900/20";
                        if(article.category.toLowerCase().includes('case')) tagColorClass = "text-purple-400 border-purple-500/30 bg-purple-900/20";
                        
                        gridHTML += `
                        <a href="${articleUrl}" class="glass-card p-8 flex flex-col group relative overflow-hidden animate__animated animate__fadeIn">
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[10px] ${tagColorClass} border px-2 py-1 rounded font-bold tracking-widest uppercase">${article.category}</span>
                                <span class="text-[10px] text-gray-500 tracking-widest uppercase">${article.date}</span>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-4 group-hover:text-cyan-300 transition-colors leading-snug">${article.title}</h3>
                            <p class="text-sm text-gray-400 leading-relaxed mb-8 flex-grow line-clamp-3">${article.summary}</p>
                            <div class="mt-auto flex justify-between items-center border-t border-white/5 pt-4">
                                <span class="text-xs text-gray-500">${article.read_time} MIN READ</span>
                                <span class="text-gray-600 group-hover:text-cyan-400 transition-transform transform group-hover:translate-x-1">→</span>
                            </div>
                        </a>`;
                    }
                });
                
                gridHTML += '</div>';
                wrapper.innerHTML = featuredHTML + gridHTML;
            }
        });
    </script>
</body>
</html>
